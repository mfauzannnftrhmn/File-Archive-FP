<ion-content
  [fullscreen]="true"
  class="flex items-center justify-center h-full 
    bg-gradient-to-br from-[#FDE2E4] via-[#FAD2E1] to-[#E2C2F0] 
    dark:from-[#2C1A2E] dark:via-[#3A2340] dark:to-[#1A0F1F]"
>

  <div class="absolute bottom-0 right-0 hidden md:block">
    <div class="w-64 h-64 bg-[#E75480] opacity-10 rounded-full -mb-20 -mr-20"></div>
  </div>
  
  <div class="absolute top-1/4 left-0 hidden md:block">
    <div class="w-40 h-40 bg-[#E75480] opacity-10 rounded-full -ml-20"></div>
  </div>

  <div
    id="container"
    class="w-full max-w-md p-6 sm:p-8 bg-white dark:bg-gray-800 rounded-2xl shadow-xl mx-auto my-4 sm:my-0 relative z-10 border border-gray-100 dark:border-gray-700"
  >
 
    <div class="flex justify-center -mt-16 mb-6">
      <div class="w-20 h-20 bg-white dark:bg-gray-800 rounded-full flex items-center justify-center shadow-lg border-4 border-[#E75480]/20">
        <img
          src="assets/icon/logo.png"
          alt="Logo"
          class="w-22 h-25"
        />
      </div>
    </div>

    <div class="text-center mb-8">
      <h2 class="text-2xl font-bold text-[#E75480] dark:text-[#FF8FB1]">Selamat Datang Di Paud Teratai IV</h2>
      <p class="text-gray-500 dark:text-gray-400 text-sm mt-2">Login untuk melanjutkan Pembelajaran</p>
    </div>
    
    <form class="space-y-5" (ngSubmit)="doSubmit()">

      <div class="relative bg-gray-50 dark:bg-gray-900 rounded-xl overflow-hidden transition-all duration-300 focus-within:ring-2 focus-within:ring-[#E75480] dark:focus-within:ring-[#FF8FB1] border border-gray-200 dark:border-gray-700">
        <div class="flex items-center">
          <div class="bg-[#E75480] dark:bg-[#D14270] p-3 flex items-center justify-center">
            <ion-icon
              name="mail-outline"
              class="text-white text-xl"
            ></ion-icon>
          </div>
          <div class="flex-1">
            <ion-input
              [(ngModel)]="email"
              name="email"
              type="email"
              placeholder="Masukkan Email anda"
              class="w-full py-3 px-4 text-gray-700 dark:text-gray-200 focus:outline-none transition-all duration-200 bg-transparent"
            ></ion-input>
          </div>
        </div>
      </div>

      <div class="relative bg-gray-50 dark:bg-gray-900 rounded-xl overflow-hidden transition-all duration-300 focus-within:ring-2 focus-within:ring-[#E75480] dark:focus-within:ring-[#FF8FB1] border border-gray-200 dark:border-gray-700">
        <div class="flex items-center">
          <div class="bg-[#E75480] dark:bg-[#D14270] p-3 flex items-center justify-center">
            <ion-icon
              name="lock-closed-outline"
              class="text-white text-xl"
            ></ion-icon>
          </div>
          <div class="flex-1">
            <ion-input
              [(ngModel)]="password"
              name="password"
              type="password"
              placeholder="Masukkan Password anda"
              class="w-full py-3 px-4 text-gray-700 dark:text-gray-200 focus:outline-none transition-all duration-200 bg-transparent"
            ></ion-input>
          </div>
        </div>
      </div>

      <div class="flex justify-between items-center text-sm">
        <a [routerLink]="['/lupapassword']" class="text-[#E75480] dark:text-[#FF8FB1] font-medium hover:underline transition-colors">Lupa password?</a>
      </div>

      <ion-button
        expand="block"
        class="mt-8 font-medium text-white tracking-wide overflow-hidden"
        (click)="doSubmit()"
        shape="round"
        style="--background: #E75480; --background-activated: #D14270; --background-hover: #D14270;"
      >
        <ion-icon name="log-in-outline" slot="start"></ion-icon>
        Masuk
      </ion-button>

      <p class="text-center text-xs text-gray-500 dark:text-gray-400 mt-6">
        Butuh bantuan? <a href="/option" class="text-[#E75480] dark:text-[#FF8FB1] hover:underline">Silahkan tanya Kakoi</a>
      </p>
    </form>
  </div>
</ion-content>
