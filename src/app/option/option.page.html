<ion-content>
<div *ngIf="isLoading" class="loading-screen">
  <img src="assets/loading.gif" alt="Memuat..." class="loading-gif" />
  <p class="loading-text">Memuat aplikasi...</p>
</div>


  <div class="star-background">
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
  </div>

  <div class="main-content flex flex-col justify-center h-full mt-[155px]">
    <div class="text-center mb-10 px-4">
      <h1 class="text-4xl font-extrabold tracking-tight" style="color: #ffe4d8;">Selamat Datang</h1>
      <p class="mt-2 text-lg" style="color: #ffe4d8;">Selamat datang di POS PAUD Teratai IV.</p>
    </div>

    <div class="w-full grid grid-cols-1 gap-6 px-4">
      <ion-card (click)="goToLogin()" class="group m-0 cursor-pointer rounded-2xl bg-white/70 backdrop-blur-md"
        style="border: 1px solid var(--border-color);" onmouseover="this.style.borderColor='var(--accent-hover)';"
        onmouseout="this.style.borderColor='var(--border-color)';">
        <div class="p-6 flex flex-col items-center text-center">
          <div class="p-4 rounded-full mb-4" style="background-color: var(--muted-orange);">
            <ion-icon name="key-outline" class="text-4xl" style="color: rgb(0, 0, 0);"></ion-icon>
          </div>
          <div>
            <ion-card-title class="text-xl font-bold" style="color: black;">Akses Pembelajaran</ion-card-title>
            <ion-card-subtitle class="mt-1 text-base" style="color: black;">Login untuk mengakses pembelajaran.</ion-card-subtitle>
          </div>
        </div>
      </ion-card>

      <ion-card (click)="goToChat()" class="group m-0 cursor-pointer rounded-2xl bg-white/70 backdrop-blur-md"
        style="border: 1px solid var(--border-color);" onmouseover="this.style.borderColor='var(--accent-hover)';"
        onmouseout="this.style.borderColor='var(--border-color)';">
        <div class="p-6 flex flex-col items-center text-center">
          <div class="p-4 rounded-full mb-4" style="background-color: var(--muted-orange);">
            <ion-icon name="chatbubbles-outline" class="text-4xl" style="color: rgb(0, 0, 0);"></ion-icon>
          </div>
          <div>
            <ion-card-title class="text-xl font-bold" style="color: black;">Kakoi</ion-card-title>
            <ion-card-subtitle class="mt-1 text-base" style="color: black;">Daftar dan mulailah percakapan dengan Kakoi.</ion-card-subtitle>
          </div>
        </div>
      </ion-card>

      <ion-card (click)="resendToChatky()" class="group m-0 cursor-pointer rounded-2xl bg-white/70 backdrop-blur-md mb-20"
        style="border: 1px solid var(--border-color);" onmouseover="this.style.borderColor='var(--accent-hover)';"
        onmouseout="this.style.borderColor='var(--border-color)';">
        <div class="p-6 flex flex-col items-center text-center">
          <div class="p-4 rounded-full mb-4" style="background-color: var(--muted-orange);">
            <ion-icon name="mail-outline" class="text-4xl" style="color: rgb(0, 0, 0);"></ion-icon>
          </div>
          <div>
            <ion-card-title class="text-xl font-bold" style="color: black;">Kirim Ulang Email</ion-card-title>
            <ion-card-subtitle class="mt-1 text-base" style="color: black;">Jika Anda blm menerima Link verifikasi silahkan klik</ion-card-subtitle>
          </div>
        </div>
      </ion-card>
    </div>
  </div>
</ion-content>
